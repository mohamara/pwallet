# PWallet — فقط اپلیکیشن

services:
  pwallet:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pwallet
    restart: unless-stopped
    ports:
      # روی همه interfaceهای host — تا Caddy داخل Docker بتواند via host.docker.internal یا 172.17.0.1 وصل شود
      - "3080:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
