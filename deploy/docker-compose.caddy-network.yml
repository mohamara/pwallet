# اگر Caddy اصلی شما داخل Docker است، از این override استفاده کنید.
#
# روش خودکار (پیشنهادی):
#   bash deploy/up-with-caddy.sh
#
# روش دستی:
#   docker inspect accounter_caddy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}'
#   CADDY_NETWORK=accounter_default docker compose -f docker-compose.yml -f deploy/docker-compose.caddy-network.yml up -d --build

services:
  pwallet:
    ports: []
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
    name: ${CADDY_NETWORK:?Set CADDY_NETWORK — run: bash deploy/up-with-caddy.sh}
